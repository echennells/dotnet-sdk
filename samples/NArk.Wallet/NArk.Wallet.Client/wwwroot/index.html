<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Arkade Wallet</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />
    <meta name="theme-color" content="#101010" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
</head>
<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;height:100dvh;background:#101010;">
            <div style="width:120px;height:20px;border-radius:8px;background:linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.08) 50%,rgba(255,255,255,0.04) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;"></div>
        </div>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="js/interop.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js');</script>
    <style>@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}</style>
</body>
</html>
